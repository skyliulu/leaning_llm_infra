<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="460" viewBox="0 0 1400 460" role="img" aria-label="Reinforcement learning theory storyline">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111"/>
    </marker>
    <style>
      .box { fill:#f8f8f8; stroke:#111; stroke-width:2; rx:5; }
      .question { font-family:Arial, Helvetica, sans-serif; font-size:17px; fill:#444; }
      .title { font-family:Arial, Helvetica, sans-serif; font-size:22px; fill:#111; font-weight:700; }
      .small { font-family:Arial, Helvetica, sans-serif; font-size:16px; fill:#111; }
      .line { stroke:#111; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
      .branch { stroke:#111; stroke-width:1.8; fill:none; stroke-dasharray:6 5; marker-end:url(#arrow); }
    </style>
  </defs>
  <text x="445" y="42" class="title">The storyline of reinforcement learning theory</text>

  <rect x="30" y="120" width="190" height="150" class="box"/>
  <text x="55" y="153" class="question">How do we describe</text>
  <text x="55" y="176" class="question">sequential decisions?</text>
  <text x="92" y="218" class="title">MDP</text>
  <text x="56" y="246" class="small">state, action, reward, policy</text>

  <rect x="260" y="120" width="205" height="150" class="box"/>
  <text x="286" y="153" class="question">How good is a policy?</text>
  <text x="310" y="202" class="title">Value</text>
  <text x="282" y="233" class="small">return and expectation</text>

  <rect x="505" y="120" width="210" height="150" class="box"/>
  <text x="535" y="153" class="question">How are values related?</text>
  <text x="557" y="202" class="title">Bellman</text>
  <text x="535" y="233" class="small">one-step recursion</text>

  <rect x="755" y="70" width="225" height="130" class="box"/>
  <text x="787" y="103" class="question">Model is known</text>
  <text x="805" y="145" class="title">Dynamic Planning</text>
  <text x="790" y="174" class="small">VI / PI / optimality</text>

  <rect x="755" y="245" width="225" height="130" class="box"/>
  <text x="780" y="278" class="question">Model is unknown</text>
  <text x="820" y="320" class="title">Sampling</text>
  <text x="802" y="349" class="small">MC / stochastic approximation / TD</text>

  <rect x="1020" y="120" width="185" height="150" class="box"/>
  <text x="1042" y="153" class="question">Space is too large</text>
  <text x="1053" y="202" class="title">Functions</text>
  <text x="1048" y="233" class="small">features / neural networks</text>

  <rect x="1240" y="120" width="135" height="150" class="box"/>
  <text x="1254" y="153" class="question">Optimize policy</text>
  <text x="1258" y="198" class="title">PG</text>
  <text x="1253" y="227" class="small">Actor-Critic</text>

  <path d="M220 195 L258 195" class="line"/>
  <path d="M465 195 L503 195" class="line"/>
  <path d="M715 175 C735 155 740 145 753 140" class="line"/>
  <path d="M715 220 C735 255 740 280 753 300" class="line"/>
  <path d="M980 135 C1000 145 1007 168 1018 180" class="line"/>
  <path d="M980 310 C1000 285 1007 240 1018 215" class="line"/>
  <path d="M1205 195 L1238 195" class="line"/>

  <text x="260" y="420" class="small">Each new method answers a limitation of the previous one; the sequence is causal, not a list of algorithms.</text>
</svg>
