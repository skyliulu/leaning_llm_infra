<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="590" viewBox="0 0 1180 590" role="img" aria-label="Three by three gridworld from the course">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111"/>
    </marker>
    <style>
      .cell { fill:#fff; stroke:#111; stroke-width:1.7; }
      .start { fill:#e0e0e0; stroke:#111; stroke-width:2.4; }
      .goal { fill:#f3f3f3; stroke:#111; stroke-width:3; }
      .bad { fill:#c9c9c9; stroke:#111; stroke-width:2; stroke-dasharray:7 5; }
      .title { font-family:Arial, Helvetica, sans-serif; font-size:24px; fill:#111; font-weight:700; }
      .text { font-family:Arial, Helvetica, sans-serif; font-size:18px; fill:#111; }
      .math { font-family:"Times New Roman", Times, serif; font-size:24px; fill:#111; }
      .line { stroke:#111; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <text x="330" y="45" class="title">The 3 x 3 gridworld used throughout the course</text>

  <g transform="translate(90,110)">
    <rect x="0" y="0" width="115" height="115" class="start"/>
    <rect x="115" y="0" width="115" height="115" class="cell"/>
    <rect x="230" y="0" width="115" height="115" class="cell"/>
    <rect x="0" y="115" width="115" height="115" class="cell"/>
    <rect x="115" y="115" width="115" height="115" class="cell"/>
    <rect x="230" y="115" width="115" height="115" class="bad"/>
    <rect x="0" y="230" width="115" height="115" class="bad"/>
    <rect x="115" y="230" width="115" height="115" class="cell"/>
    <rect x="230" y="230" width="115" height="115" class="goal"/>

    <text x="45" y="58" class="math">s1</text>
    <text x="160" y="58" class="math">s2</text>
    <text x="275" y="58" class="math">s3</text>
    <text x="45" y="173" class="math">s4</text>
    <text x="160" y="173" class="math">s5</text>
    <text x="275" y="173" class="math">s6</text>
    <text x="45" y="288" class="math">s7</text>
    <text x="160" y="288" class="math">s8</text>
    <text x="275" y="288" class="math">s9</text>

    <text x="35" y="91" class="text">start</text>
    <text x="249" y="207" class="text">forbidden</text>
    <text x="20" y="322" class="text">forbidden</text>
    <text x="269" y="322" class="text">target</text>
  </g>

  <g transform="translate(525,90)">
    <text x="0" y="20" class="title">Actions at every state</text>
    <circle cx="155" cy="145" r="38" class="cell"/>
    <text x="143" y="153" class="math">s</text>
    <path d="M155 105 L155 52" class="line"/>
    <path d="M195 145 L250 145" class="line"/>
    <path d="M155 185 L155 240" class="line"/>
    <path d="M115 145 L60 145" class="line"/>
    <circle cx="155" cy="145" r="10" fill="#111"/>
    <text x="174" y="66" class="text">a1: up</text>
    <text x="254" y="151" class="text">a2: right</text>
    <text x="174" y="238" class="text">a3: down</text>
    <text x="0" y="151" class="text">a4: left</text>
    <text x="174" y="181" class="text">a5: stay</text>
  </g>

  <g transform="translate(855,90)">
    <text x="0" y="20" class="title">Reward rules</text>
    <text x="0" y="72" class="text">hit boundary</text>
    <text x="190" y="72" class="math">-1</text>
    <text x="0" y="116" class="text">enter forbidden cell</text>
    <text x="190" y="116" class="math">-1</text>
    <text x="0" y="160" class="text">reach target s9</text>
    <text x="190" y="160" class="math">+1</text>
    <text x="0" y="204" class="text">all other moves</text>
    <text x="190" y="204" class="math">0</text>
    <rect x="0" y="255" width="260" height="105" class="cell"/>
    <text x="18" y="288" class="text">Forbidden cells are accessible.</text>
    <text x="18" y="320" class="text">The penalty discourages entry.</text>
    <text x="18" y="352" class="text">Boundary collision keeps state.</text>
  </g>

  <text x="90" y="520" class="text">Task: from any initial state, learn a policy that reaches s9 while avoiding forbidden cells, detours, and boundary collisions.</text>
</svg>
