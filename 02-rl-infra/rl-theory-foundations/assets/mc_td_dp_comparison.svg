<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="MC TD DP comparison">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111"/>
    </marker>
    <style>
      .box { fill:#f8f8f8; stroke:#111; stroke-width:2; }
      .node { fill:#fff; stroke:#111; stroke-width:2; }
      .text { font-family:Arial, Helvetica, sans-serif; font-size:23px; fill:#111; font-weight:700; }
      .small { font-family:Arial, Helvetica, sans-serif; font-size:18px; fill:#111; }
      .math { font-family:"Times New Roman", Times, serif; font-size:24px; fill:#111; }
      .line { stroke:#111; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#111; stroke-width:2; fill:none; stroke-dasharray:7 5; marker-end:url(#arrow); }
    </style>
  </defs>
  <text x="380" y="52" class="text">Three ways to estimate value</text>

  <rect x="55" y="105" width="330" height="330" class="box"/>
  <text x="88" y="150" class="text">Dynamic Programming</text>
  <text x="95" y="195" class="small">needs model p(s', r | s, a)</text>
  <circle cx="130" cy="275" r="26" class="node"/><text x="122" y="284" class="math">s</text>
  <circle cx="245" cy="220" r="24" class="node"/><text x="232" y="229" class="math">s'</text>
  <circle cx="260" cy="325" r="24" class="node"/><text x="247" y="334" class="math">s'</text>
  <path d="M155 265 L220 232" class="line"/>
  <path d="M156 285 L235 314" class="line"/>
  <text x="95" y="388" class="math">sum over all next states</text>

  <rect x="435" y="105" width="330" height="330" class="box"/>
  <text x="504" y="150" class="text">Monte Carlo</text>
  <text x="485" y="195" class="small">waits until episode return</text>
  <circle cx="505" cy="275" r="23" class="node"/><text x="497" y="284" class="math">s</text>
  <circle cx="590" cy="275" r="23" class="node"/><text x="582" y="284" class="math">s</text>
  <circle cx="675" cy="275" r="23" class="node"/><text x="667" y="284" class="math">T</text>
  <path d="M528 275 L566 275" class="line"/>
  <path d="M613 275 L651 275" class="line"/>
  <text x="485" y="388" class="math">target = G_t</text>

  <rect x="815" y="105" width="330" height="330" class="box"/>
  <text x="900" y="150" class="text">TD Learning</text>
  <text x="872" y="195" class="small">one-step sample + bootstrap</text>
  <circle cx="900" cy="275" r="26" class="node"/><text x="892" y="284" class="math">s</text>
  <circle cx="1025" cy="275" r="26" class="node"/><text x="1012" y="284" class="math">s'</text>
  <path d="M927 275 L997 275" class="line"/>
  <text x="905" y="245" class="small">r</text>
  <path d="M1030 249 C1040 215 1070 215 1080 250" class="dash"/>
  <text x="875" y="388" class="math">target = r + gamma V(s')</text>
</svg>
