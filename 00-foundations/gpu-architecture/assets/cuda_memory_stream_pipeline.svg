<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620">
  <defs>
    <style>
      .title{font:700 28px Arial,'Noto Sans CJK SC',sans-serif;fill:#111827}.label{font:700 18px Arial,'Noto Sans CJK SC',sans-serif;fill:#111827}.text{font:15px Arial,'Noto Sans CJK SC',sans-serif;fill:#374151}.small{font:13px Arial,'Noto Sans CJK SC',sans-serif;fill:#4b5563}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:14}.host{fill:#ecfeff;stroke:#0891b2}.global{fill:#fff7ed;stroke:#ea580c}.cache{fill:#fef9c3;stroke:#ca8a04}.shared{fill:#f0fdf4;stroke:#16a34a}.reg{fill:#eef2ff;stroke:#4f46e5}.bar1{fill:#93c5fd}.bar2{fill:#86efac}.bar3{fill:#fbbf24}.arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 8}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
  </defs>
  <text x="48" y="48" class="title">CUDA 存储层级与异步流水</text>
  <rect x="70" y="100" width="170" height="80" class="box host"/><text x="110" y="135" class="label">Host Memory</text><text x="104" y="162" class="small">dataset / pinned buffer</text>
  <rect x="300" y="100" width="175" height="80" class="box global"/><text x="345" y="135" class="label">Global Memory</text><text x="346" y="162" class="small">HBM / GDDR</text>
  <rect x="535" y="100" width="155" height="80" class="box cache"/><text x="590" y="135" class="label">L2</text><text x="562" y="162" class="small">GPU-wide cache</text>
  <rect x="750" y="100" width="170" height="80" class="box shared"/><text x="785" y="135" class="label">Shared / L1</text><text x="790" y="162" class="small">block scope</text>
  <rect x="980" y="100" width="170" height="80" class="box reg"/><text x="1023" y="135" class="label">Register</text><text x="1030" y="162" class="small">thread scope</text>
  <path d="M240 140 H300" class="arrow"/><path d="M475 140 H535" class="arrow"/><path d="M690 140 H750" class="arrow"/><path d="M920 140 H980" class="arrow"/>
  <text x="82" y="235" class="label">访问优化主线</text>
  <text x="82" y="270" class="text">1. coalescing：warp 内连续、对齐访问减少 memory transaction</text>
  <text x="82" y="302" class="text">2. tiling：把 global memory 数据搬到 shared memory 后多次复用</text>
  <text x="82" y="334" class="text">3. register blocking：让中间累加尽量停留在线程私有寄存器</text>
  <text x="82" y="366" class="text">4. async copy / double buffering：把数据搬运和计算重叠</text>
  <rect x="80" y="430" width="1080" height="45" class="box"/><text x="95" y="459" class="label">Stream 0</text><rect x="210" y="438" width="160" height="29" class="bar1"/><text x="247" y="458" class="small">H2D batch 0</text><rect x="380" y="438" width="250" height="29" class="bar2"/><text x="460" y="458" class="small">compute 0</text><rect x="640" y="438" width="130" height="29" class="bar3"/><text x="673" y="458" class="small">D2H</text>
  <rect x="80" y="495" width="1080" height="45" class="box"/><text x="95" y="524" class="label">Stream 1</text><rect x="380" y="503" width="160" height="29" class="bar1"/><text x="417" y="523" class="small">H2D batch 1</text><rect x="550" y="503" width="250" height="29" class="bar2"/><text x="630" y="523" class="small">compute 1</text><rect x="810" y="503" width="130" height="29" class="bar3"/><text x="843" y="523" class="small">D2H</text>
  <path d="M210 410 V555" class="arrow dash"/><text x="205" y="590" class="small">time →</text>
</svg>
