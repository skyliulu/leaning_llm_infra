<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <style>
      .title{font:700 28px Arial,'Noto Sans CJK SC',sans-serif;fill:#111827}.label{font:700 20px Arial,'Noto Sans CJK SC',sans-serif;fill:#111827}.text{font:16px Arial,'Noto Sans CJK SC',sans-serif;fill:#374151}.small{font:14px Arial,'Noto Sans CJK SC',sans-serif;fill:#4b5563}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:18}.cpu{fill:#ecfeff;stroke:#0891b2}.gpu{fill:#f0fdf4;stroke:#16a34a}.mem{fill:#fff7ed;stroke:#ea580c}.kernel{fill:#eef2ff;stroke:#4f46e5}.arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.dashed{stroke-dasharray:8 8}.num{font:700 15px Arial,sans-serif;fill:white}.circle{fill:#2563eb}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
  </defs>
  <text x="48" y="48" class="title">CUDA Host / Device 执行闭环</text>
  <rect x="60" y="95" width="440" height="360" class="box cpu"/>
  <text x="90" y="135" class="label">Host：CPU 侧控制面</text>
  <text x="90" y="175" class="text">• 分配 host / device memory</text>
  <text x="90" y="207" class="text">• 准备输入、组织 batch / tensor</text>
  <text x="90" y="239" class="text">• 发起 cudaMemcpyAsync</text>
  <text x="90" y="271" class="text">• launch kernel 到 stream</text>
  <text x="90" y="303" class="text">• 事件同步、错误检查、调度后续任务</text>
  <rect x="780" y="95" width="440" height="360" class="box gpu"/>
  <text x="810" y="135" class="label">Device：GPU 侧数据面</text>
  <text x="810" y="175" class="text">• HBM / GDDR 保存 tensor 与中间结果</text>
  <text x="810" y="207" class="text">• SM 接收 thread block</text>
  <text x="810" y="239" class="text">• warp scheduler 发射指令</text>
  <text x="810" y="271" class="text">• CUDA Core / Tensor Core 执行计算</text>
  <text x="810" y="303" class="text">• L2 / Shared / Register 提供数据复用</text>
  <rect x="545" y="155" width="190" height="85" class="box mem"/>
  <text x="575" y="190" class="label">数据移动</text>
  <text x="575" y="218" class="small">PCIe / NVLink / UMA</text>
  <rect x="545" y="310" width="190" height="85" class="box kernel"/>
  <text x="585" y="345" class="label">Kernel</text>
  <text x="572" y="373" class="small">grid → block → warp</text>
  <path d="M500 198 H545" class="arrow"/>
  <path d="M735 198 H780" class="arrow"/>
  <path d="M780 352 H735" class="arrow"/>
  <path d="M545 352 H500" class="arrow"/>
  <path d="M280 455 C280 520 1000 520 1000 455" class="arrow dashed"/>
  <circle cx="520" cy="198" r="14" class="circle"/><text x="515" y="204" class="num">1</text>
  <circle cx="760" cy="198" r="14" class="circle"/><text x="755" y="204" class="num">2</text>
  <circle cx="760" cy="352" r="14" class="circle"/><text x="755" y="358" class="num">3</text>
  <circle cx="520" cy="352" r="14" class="circle"/><text x="515" y="358" class="num">4</text>
  <text x="305" y="505" class="small">异步 stream + event 让拷贝、计算、通信形成流水；同步点会打断重叠并放大尾延迟。</text>
</svg>
