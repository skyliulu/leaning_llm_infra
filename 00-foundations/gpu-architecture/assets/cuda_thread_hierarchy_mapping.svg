<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620">
  <defs>
    <style>
      .title{font:700 28px Arial,'Noto Sans CJK SC',sans-serif;fill:#111827}.label{font:700 19px Arial,'Noto Sans CJK SC',sans-serif;fill:#111827}.text{font:15px Arial,'Noto Sans CJK SC',sans-serif;fill:#374151}.small{font:13px Arial,'Noto Sans CJK SC',sans-serif;fill:#4b5563}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:16}.grid{fill:#eff6ff;stroke:#2563eb}.block{fill:#eef2ff;stroke:#4f46e5}.warp{fill:#f0fdf4;stroke:#16a34a}.sm{fill:#fff7ed;stroke:#ea580c}.arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.thin{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
  </defs>
  <text x="48" y="48" class="title">CUDA 逻辑线程层级到 GPU 硬件的映射</text>
  <rect x="60" y="92" width="520" height="430" class="box grid"/>
  <text x="92" y="130" class="label">Grid：一次 kernel launch 的任务空间</text>
  <rect x="95" y="165" width="200" height="145" class="box block"/>
  <rect x="335" y="165" width="200" height="145" class="box block"/>
  <rect x="95" y="345" width="200" height="145" class="box block"/>
  <rect x="335" y="345" width="200" height="145" class="box block"/>
  <text x="128" y="198" class="label">Block 0</text><text x="368" y="198" class="label">Block 1</text><text x="128" y="378" class="label">Block 2</text><text x="368" y="378" class="label">Block 3</text>
  <g class="warp">
    <rect x="125" y="220" width="140" height="24" rx="8"/><rect x="125" y="255" width="140" height="24" rx="8"/>
    <rect x="365" y="220" width="140" height="24" rx="8"/><rect x="365" y="255" width="140" height="24" rx="8"/>
    <rect x="125" y="400" width="140" height="24" rx="8"/><rect x="125" y="435" width="140" height="24" rx="8"/>
    <rect x="365" y="400" width="140" height="24" rx="8"/><rect x="365" y="435" width="140" height="24" rx="8"/>
  </g>
  <text x="142" y="238" class="small">warp: 32 threads</text><text x="142" y="273" class="small">warp: 32 threads</text><text x="382" y="238" class="small">warp: 32 threads</text><text x="382" y="273" class="small">warp: 32 threads</text><text x="142" y="418" class="small">warp: 32 threads</text><text x="142" y="453" class="small">warp: 32 threads</text><text x="382" y="418" class="small">warp: 32 threads</text><text x="382" y="453" class="small">warp: 32 threads</text>
  <rect x="735" y="92" width="455" height="430" class="box sm"/>
  <text x="765" y="130" class="label">SM：执行 block 的硬件单元</text>
  <rect x="775" y="170" width="170" height="92" class="box"/><text x="798" y="205" class="label">Warp Scheduler</text><text x="806" y="235" class="small">选择 ready warp</text>
  <rect x="985" y="170" width="160" height="92" class="box"/><text x="1018" y="205" class="label">Register File</text><text x="1012" y="235" class="small">线程上下文</text>
  <rect x="775" y="305" width="170" height="92" class="box"/><text x="804" y="340" class="label">CUDA Core</text><text x="806" y="370" class="small">标量 / 向量指令</text>
  <rect x="985" y="305" width="160" height="92" class="box"/><text x="1018" y="340" class="label">Tensor Core</text><text x="1015" y="370" class="small">矩阵乘加</text>
  <rect x="875" y="430" width="180" height="55" class="box"/><text x="900" y="464" class="label">Shared / L1</text>
  <path d="M580 235 C650 235 665 215 735 215" class="arrow"/>
  <path d="M580 415 C650 415 665 455 735 455" class="arrow"/>
  <path d="M945 216 H985" class="thin"/><path d="M860 262 V305" class="thin"/><path d="M945 350 H985" class="thin"/><path d="M965 397 V430" class="thin"/>
  <text x="80" y="565" class="text">调优直觉：block 大小决定每个 CTA 的协作粒度；寄存器和 shared memory 用量决定 SM 上能驻留多少 block / warp；warp 分支和访存模式决定真实吞吐。</text>
</svg>
